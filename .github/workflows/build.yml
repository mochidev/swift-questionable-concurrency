name: Build QuestionableConcurrency

on:
  pull_request:
    branches:
    - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  Build-Release-6-0:
    name: Build Swift 6.0 Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout Source
      uses: actions/checkout@v6
    - name: Set Swift Version
      uses: vapor/swiftly-action@v0.2
      with:
        toolchain: "6.0"
    - name: Swift Version
      run: |
        swift --version
    - name: Build
      run: |
        swift build --configuration release

  Build-Debug-6-0:
    name: Build Swift 6.0 Debug
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout Source
      uses: actions/checkout@v6
    - name: Set Swift Version
      uses: vapor/swiftly-action@v0.2
      with:
        toolchain: "6.0"
    - name: Swift Version
      run: |
        swift --version
    - name: Build
      run: |
        swift build --configuration debug

  Build-Release-6-1:
    name: Build Swift 6.1 Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout Source
      uses: actions/checkout@v6
    - name: Set Swift Version
      uses: vapor/swiftly-action@v0.2
      with:
        toolchain: "6.1"
    - name: Swift Version
      run: |
        swift --version
    - name: Build
      run: |
        swift build --configuration release

  Build-Debug-6-1:
    name: Build Swift 6.1 Debug
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout Source
      uses: actions/checkout@v6
    - name: Set Swift Version
      uses: vapor/swiftly-action@v0.2
      with:
        toolchain: "6.1"
    - name: Swift Version
      run: |
        swift --version
    - name: Build
      run: |
        swift build --configuration debug
