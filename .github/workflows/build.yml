name: Build QuestionableConcurrency

on:
  pull_request:
    branches:
    - main

jobs:
  Build-Release-5-9:
    name: Build Swift 5.9 Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout Source
      uses: actions/checkout@v6
    - name: Set Swift Version
      uses: vapor/swiftly-action@v0.2
      with:
        toolchain: "5.9"
    - name: Swift Version
      run: |
        swift --version
    - name: Build
      run: |
        swift build --configuration release

  Build-Debug-5-9:
    name: Build Swift 5.9 Debug
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout Source
      uses: actions/checkout@v6
    - name: Set Swift Version
      uses: vapor/swiftly-action@v0.2
      with:
        toolchain: "5.9"
    - name: Swift Version
      run: |
        swift --version
    - name: Build
      run: |
        swift build --configuration debug

  Build-Release-5-10:
    name: Build Swift 5.10 Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout Source
      uses: actions/checkout@v6
    - name: Set Swift Version
      uses: swift-actions/setup-swift@v3
      with:
        skip-verify-signature: true
        swift-version: "5.10"
    - name: Swift Version
